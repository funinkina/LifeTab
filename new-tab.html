    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Tab</title>
    <link rel="icon" id="favicon" type="image/svg+xml" href="favicon.svg">
    <link rel="preload" href="fonts/inter-latin.woff2" as="font"
      type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/jetbrains-mono-latin.woff2" as="font"
      type="font/woff2" crossorigin>
    <link rel="stylesheet" href="newtab.css">

  <body>

    <div id="bg-layer"></div>

    <!-- ── Clock (primary) + fidget grid ──────────────── -->
    <div class="clock-row">
      <section class="clock">
        <div class="greeting label" id="greeting"></div>
        <div class="time" id="time-display"></div>
        <div class="dateline label" id="dateline"></div>
      </section>
      <div class="fidget" id="fidget" aria-hidden="true"></div>
    </div>

    <!-- ── Search bar ────────────────────────────────── -->
    <section class="search" id="search-section">
      <div class="search-bar">
        <div class="search-engine-selector" id="search-engine-selector">
          <button class="search-engine-tag" id="search-engine-tag"
            aria-label="Select search engine" aria-expanded="false">
            <img class="search-engine-favicon" id="search-engine-favicon" src
              alt>
            <span id="search-engine-label">GOOGLE</span>
          </button>
          <div class="search-engine-dropdown" id="search-engine-dropdown"></div>
        </div>
        <input type="text" class="search-input" id="search-input"
          placeholder="SEARCH…" autocomplete="off" spellcheck="false">
        <button class="search-submit" id="search-submit"
          aria-label="Search">→</button>
      </div>
      <ul class="search-suggestions" id="search-suggestions"
        role="listbox"></ul>
    </section>

    <!-- ── Bottom grid ────────────────────────────────── -->
    <section class="grid">

      <div class="panel">
        <span class="label">WEATHER</span>
        <div id="weather-body"></div>
      </div>

      <div class="panel">
        <span class="label">LINKS</span>
        <div id="links-grid"></div>
      </div>

    </section>

    <!-- Keyboard shortcuts hint (bottom-right, fixed) -->
    <div class="kb-hints" aria-hidden="true">
      <span class="kb-hint"><kbd>/</kbd> Search</span>
      <span class="kb-hint"><kbd>1–9</kbd> Quick link</span>
    </div>

    <!-- Settings overlay -->
    <div class="settings-overlay" id="settings-overlay">
      <div class="settings-panel">

        <div class="settings-header">
          <span class="label">SETTINGS</span>
          <button class="settings-close" id="settings-close">✕ CLOSE</button>
        </div>

        <div class="settings-body">

          <div class="settings-section">
            <span class="label s-section-title">GENERAL</span>
            <div class="settings-field">
              <label class="label" for="s-name">Name</label>
              <input id="s-name" type="text" class="settings-input"
                placeholder="Your first name">
            </div>
            <div class="settings-field">
              <label class="label" for="s-font">Font</label>
              <input id="s-font" type="text" class="settings-input"
                placeholder="Locally installed font name" spellcheck="false">
            </div>
          </div>

          <div class="settings-section">
            <span class="label s-section-title">APPEARANCE</span>
            <div class="settings-field s-accent-field">
              <label class="label">Accent</label>
              <div class="s-accent-picker">
                <div class="s-accent-presets" id="s-accent-presets"></div>
                <input id="s-accent-custom" type="text" class="settings-input"
                  placeholder="#D71921" maxlength="7" spellcheck="false">
              </div>
            </div>
            <div class="settings-field">
              <label class="label" for="s-pixel-grid">Pixel grid</label>
              <select id="s-pixel-grid" class="settings-input">
                <option value="show">Show</option>
                <option value="hide">Hide</option>
              </select>
            </div>
            <div class="settings-field">
              <label class="label" for="s-bg-source">Background</label>
              <select id="s-bg-source" class="settings-input">
                <option value="none">None</option>
                <option value="url">URL</option>
                <option value="file">Local file</option>
              </select>
            </div>
            <div class="settings-field s-bg-cond" id="s-bg-url-row">
              <label class="label" for="s-bg-url">Image URL</label>
              <input id="s-bg-url" type="text" class="settings-input"
                placeholder="https://…" spellcheck="false">
            </div>
            <div class="settings-field s-bg-cond" id="s-bg-file-row">
              <label class="label" for="s-bg-file">Image file</label>
              <input id="s-bg-file" type="file" accept="image/*"
                class="settings-input s-file-input">
            </div>
            <div class="settings-field s-bg-cond" id="s-bg-sliders-row">
              <label class="label" for="s-bg-brightness">Brightness</label>
              <div class="s-range-wrap">
                <input id="s-bg-brightness" type="range" class="settings-range"
                  min="0" max="100" value="100">
                <span class="s-range-val" id="s-bg-brightness-val">100%</span>
              </div>
            </div>
            <div class="settings-field s-bg-cond" id="s-bg-blur-row">
              <label class="label" for="s-bg-blur">Blur</label>
              <div class="s-range-wrap">
                <input id="s-bg-blur" type="range" class="settings-range"
                  min="0" max="20" value="0">
                <span class="s-range-val" id="s-bg-blur-val">0px</span>
              </div>
            </div>
          </div>

          <div class="settings-section">
            <span class="label s-section-title">WEATHER</span>
            <div class="settings-field">
              <label class="label" for="s-weather-key">API Key</label>
              <input id="s-weather-key" type="text" class="settings-input"
                placeholder="openweathermap.org key" autocomplete="off"
                spellcheck="false">
            </div>
            <div class="settings-field">
              <label class="label" for="s-weather-loc">Location</label>
              <input id="s-weather-loc" type="text" class="settings-input"
                placeholder="City name or 'auto'">
            </div>
            <div class="settings-field">
              <label class="label" for="s-weather-units">Units</label>
              <select id="s-weather-units" class="settings-input">
                <option value="metric">Metric (°C)</option>
                <option value="imperial">Imperial (°F)</option>
              </select>
            </div>
            <div class="settings-field">
              <label class="label" for="s-weather-show-loc">Location</label>
              <select id="s-weather-show-loc" class="settings-input">
                <option value="show">Show</option>
                <option value="hide">Hide</option>
              </select>
            </div>
          </div>

          <div class="settings-section">
            <span class="label s-section-title">SEARCH</span>
            <div class="settings-field">
              <label class="label" for="s-search-engine">Engine</label>
              <select id="s-search-engine" class="settings-input">
                <option value="google">Google</option>
                <option value="ddg">DuckDuckGo</option>
                <option value="kagi">Kagi</option>
                <option value="brave">Brave</option>
                <option value="bing">Bing</option>
              </select>
            </div>
          </div>

          <div class="settings-section">
            <span class="label s-section-title">QUICK LINKS</span>
            <div id="s-links-list"></div>
            <button class="s-add-link-btn" id="s-add-link">+ ADD LINK</button>
          </div>

        </div>

        <div class="settings-footer">
          <button class="settings-save" id="settings-save">SAVE</button>
        </div>

      </div>
    </div>

    <script src="newtab.js"></script>

  </body>
</html>
