<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700&family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens · dark (default) ──────────────────────── */
    :root {
      --black:           #000000;
      --surface:         #111111;
      --surface-raised:  #1A1A1A;
      --border:          #222222;
      --border-visible:  #333333;
      --text-disabled:   #666666;
      --text-secondary:  #999999;
      --text-primary:    #E8E8E8;
      --text-display:    #FFFFFF;
      --accent:          #D71921;

      --space-sm:  8px;
      --space-md:  16px;
      --space-lg:  24px;
      --space-xl:  32px;
      --space-2xl: 48px;
      --space-3xl: 64px;
    }

    /* ── Tokens · light ───────────────────────────────── */
    @media (prefers-color-scheme: light) {
      :root {
        --black:          #F5F5F5;
        --surface:        #FFFFFF;
        --surface-raised: #F0F0F0;
        --border:         #E8E8E8;
        --border-visible: #CCCCCC;
        --text-disabled:  #999999;
        --text-secondary: #666666;
        --text-primary:   #1A1A1A;
        --text-display:   #000000;
      }
    }

    /* ── Reset ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }

    body {
      background: var(--black);
      color: var(--text-primary);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(28px, 5vw, 72px);
    }

    /* ── Shared label (instrument panel) ──────────────── */
    .label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* ── Top bar ──────────────────────────────────────── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .live {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      color: var(--text-disabled);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
    }

    /* ── Clock (primary layer) ────────────────────────── */
    .clock {
      margin-top: var(--space-2xl);
      opacity: 0;
      animation: fadeIn 0.5s cubic-bezier(0.25,0.1,0.25,1) 0.05s forwards;
    }

    .greeting { margin-bottom: var(--space-md); }

    .time {
      font-family: 'Doto', 'Space Mono', monospace;
      font-size: clamp(64px, 13vw, 150px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0.01em;
      color: var(--text-display);
    }

    .time .sep { color: var(--text-disabled); }

    .time .sec {
      font-size: 0.36em;
      vertical-align: top;
      color: var(--text-secondary);
      margin-left: 0.12em;
      letter-spacing: 0.05em;
    }

    .dateline { margin-top: var(--space-md); }

    /* ── Bottom grid (secondary / tertiary) ───────────── */
    .grid {
      margin-top: auto;
      padding-top: var(--space-3xl);
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: var(--space-2xl);
      opacity: 0;
      animation: fadeIn 0.5s cubic-bezier(0.25,0.1,0.25,1) 0.18s forwards;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; gap: var(--space-xl); }
    }

    .panel { border-top: 1px solid var(--border-visible); padding-top: var(--space-md); }
    .panel > .label { margin-bottom: var(--space-lg); display: block; }

    /* ── Weather ──────────────────────────────────────── */
    .w-temp {
      font-family: 'Space Mono', monospace;
      font-size: 48px;
      font-weight: 400;
      line-height: 1;
      color: var(--text-display);
    }

    .w-temp .w-unit {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      vertical-align: top;
      margin-left: 4px;
    }

    .w-desc {
      margin-top: var(--space-sm);
      font-size: 15px;
      color: var(--text-primary);
    }

    .stat-rows { margin-top: var(--space-lg); }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: var(--space-sm) 0;
      border-top: 1px solid var(--border);
    }

    .stat-val {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--text-primary);
    }

    .w-placeholder {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .w-placeholder a { color: var(--accent); text-decoration: none; }

    .w-placeholder code {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-primary);
      border: 1px solid var(--border-visible);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* ── Quick links (directory list) ─────────────────── */
    .link {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) 0;
      border-top: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-primary);
      transition: color 0.18s cubic-bezier(0.25,0.1,0.25,1);
    }

    .link-idx {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-disabled);
      min-width: 22px;
    }

    .link-name {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex: 1;
    }

    .link-arrow {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--text-disabled);
      transition: transform 0.18s cubic-bezier(0.25,0.1,0.25,1), color 0.18s;
    }

    .link:hover { color: var(--text-display); }
    .link:hover .link-arrow { color: var(--accent); transform: translateX(4px); }

    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

  <!-- ── Top bar (tertiary) ─────────────────────────── -->
  <div class="topbar">
    <span class="label">NEW&nbsp;TAB</span>
    <span class="live label">
      <span class="live-dot"></span>LIVE
    </span>
  </div>

  <!-- ── Clock (primary) ────────────────────────────── -->
  <section class="clock">
    <div class="greeting label" id="greeting"></div>
    <div class="time" id="time-display"></div>
    <div class="dateline label" id="dateline"></div>
  </section>

  <!-- ── Bottom grid ────────────────────────────────── -->
  <section class="grid">

    <div class="panel">
      <span class="label">WEATHER</span>
      <div id="weather-body"></div>
    </div>

    <div class="panel">
      <span class="label">LINKS</span>
      <div id="links-grid"></div>
    </div>

  </section>

<script src="newtab.js"></script>

</body>
</html>
